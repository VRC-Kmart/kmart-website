<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
<title>	Kmart Web Server Statics</title>
<meta http-equiv="pragma" content="no-cache">
<script language="JavaScript">
<!-- For Browsers, which do not understand JavaScript
	var TimeId = 0;
	var timerOK = 0;
	function givefocus() {
		document.logon.user.focus();
		document.logon.user.select();
	}
	function dispdate() {
		formdate = new Date();
		document.showday.today.value = " " + (formdate.getMonth() + 1) + "/" + formdate.getDate() + "/" + formdate.getYear();
	}
	function disptime() {
		if (timerOK ){
			clearTimeout(TimeId);
			timerOK = 0;
		}
		formtime = new Date();
		document.showday.curtime.value = " " + formtime.getHours() + ":" + formtime.getMinutes() + ":" + formtime.getSeconds();
		TimeId = setTimeout("disptime()",1000);
		timerOK = 1;  
	}
	function doit() {
		givefocus()
		dispdate()
		disptime()
	}
// End Script -->
</script>
</head>
<body bgcolor="#FFFFFF" onload="doit()">
<form name="showday" onsubmit="0">    Date: <input type="TEXT" name="today" size="9" maxlength="9">     Time: <input type="TEXT" name="curtime" size="9" maxlength="9"></form>
<hr size="3">
<br>
<form action="/" method="post" name="logon">
<center><font color="RED">User Name:</font> <input type="text" name="user" size="20" maxlength="20">   <input type="submit" value="SUBMIT">
</center>
<br>
<center><font color="RED">Password :</font> <input type="password" name="login" size="20" maxlength="20">   <input type="reset" value="CLEAR ">
</center>
</form>
</body>
</html>
